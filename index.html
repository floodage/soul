<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="/assets/favicon_white.png"
      media="(prefers-color-scheme:dark)"
    />
    <link
      rel="icon"
      href="/assets/favicon_black.png"
      media="(prefers-color-scheme:light)"
    />
    <link rel="stylesheet" href="styles/boardstyles.css" />
    <link rel="stylesheet" href="styles/cardstyle.css" />
    <link rel="stylesheet" href="styles/minicardstyle.css" />

    <script src="cards.js" type="text/javascript"></script>
    <script src="/scripts/menu.js" type="text/javascript" defer></script>
    <script src="game.js" type="text/javascript" defer></script>
    <title>Soul TCG</title>
  </head>
  <style>
    .opp.board {
      visibility: hidden;
    }
  </style>
  <body id="body">
    <div class="loading-screen" id="loading-screen"></div>
    <div class="search-box" id="search-box"></div>
    <div class="fullcard_render" id="fullcard_render"></div>
    <div class="fullboard" id="fullboard">
      <div class="opp board">
        <div class="opp hand">
          <div class="opp handcard 1"></div>
          <div class="opp handcard 2"></div>
          <div class="opp handcard 3"></div>
          <div class="opp handcard 4"></div>
          <div class="opp handcard 5"></div>
          <div class="opp handcard 6"></div>
        </div>
        <div class="opp camp">
          <div class="card-container">
            <div class="opp boarditem 1"></div>
            <div class="opp campcard 1"></div>
          </div>
          <div class="card-container">
            <div class="opp boarditem 2"></div>
            <div class="opp campcard 2"></div>
          </div>
          <div class="card-container">
            <div class="opp boarditem 3"></div>
            <div class="opp campcard 3"></div>
          </div>
          <div class="card-container">
            <div class="opp boarditem 4"></div>
            <div class="opp campcard 4"></div>
          </div>
        </div>
        <div class="opp front">
          <div class="opp deck"></div>
          <div class="card-container">
            <div class="opp boarditem 0"></div>
            <div class="opp frontcard"></div>
          </div>
          <div class="opp discard"></div>
        </div>
      </div>
      <div class="soulscore">
        <div class="opp score">
          <input type="checkbox" class="opp soulpoint 1" />
          <input type="checkbox" class="opp soulpoint 2" />
          <input type="checkbox" class="opp soulpoint 3" />
        </div>
        <textarea
          type="text"
          id="decklist"
          name="decklist"
          class="decklist"
          style="resize: none"
        ></textarea>
        <button onclick="getDeck()">i</button>
        <button onclick="exportDeck()">E</button>
        <button onclick="getRandom()">R</button>
        <button onclick="renderAll()">P</button>

        <div class="my score">
          <input type="checkbox" class="my soulpoint 1" />
          <input type="checkbox" class="my soulpoint 2" />
          <input type="checkbox" class="my soulpoint 3" />
        </div>
      </div>
      <div class="my board">
        <div class="my front">
          <div
            class="my discard"
            id="my-discard"
            onclick="discardCard(this.id)"
          ></div>
          <div class="card-container">
            <div
              class="my boarditem 0"
              id="frontitem"
              onclick="moveCard(this.id);"
            ></div>
            <div
              class="my frontcard"
              id="front"
              onclick="moveCard(this.id);"
            ></div>
            <input class="marker" />
          </div>

          <div
            class="my deck"
            id="my-deck"
            onclick="deckCard(this.id)"
            oncontextmenu="javascript:searchDeck();return false;"
            ontouchmove="searchDeck()"
          ></div>
        </div>
        <div class="my camp">
          <div class="card-container">
            <div
              class="my boarditem 1"
              id="campitem1"
              onclick="moveCard(this.id);"
            ></div>
            <div
              class="my campcard 1"
              id="camp1"
              onclick="moveCard(this.id);"
            ></div>
            <input class="marker" />
          </div>
          <div class="card-container">
            <div
              class="my boarditem 2"
              id="campitem2"
              onclick="moveCard(this.id);"
            ></div>
            <div
              class="my campcard 2"
              id="camp2"
              onclick="moveCard(this.id);"
            ></div>
            <input class="marker" />
          </div>
          <div class="card-container">
            <div
              class="my boarditem 3"
              id="campitem3"
              onclick="moveCard(this.id);"
            ></div>
            <div
              class="my campcard 3"
              id="camp3"
              onclick="moveCard(this.id);"
            ></div>
            <input class="marker" />
          </div>
          <div class="card-container">
            <div
              class="my boarditem 4"
              id="campitem4"
              onclick="moveCard(this.id);"
            ></div>
            <div
              class="my campcard 4"
              id="camp4"
              onclick="moveCard(this.id);"
            ></div>
            <input class="marker" />
          </div>
        </div>
        <div class="my hand">
          <div
            class="my handcard 1"
            id="hand1"
            onclick="moveCard(this.id);"
          ></div>
          <div
            class="my handcard 2"
            id="hand2"
            onclick="moveCard(this.id);"
          ></div>
          <div
            class="my handcard 3"
            id="hand3"
            onclick="moveCard(this.id);"
          ></div>
          <div
            class="my handcard 4"
            id="hand4"
            onclick="moveCard(this.id);"
          ></div>
          <div
            class="my handcard 5"
            id="hand5"
            onclick="moveCard(this.id);"
          ></div>
          <div
            class="my handcard 6"
            id="hand6"
            onclick="moveCard(this.id);"
          ></div>
        </div>
      </div>
    </div>
  </body>
</html>
